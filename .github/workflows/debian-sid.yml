name: Debian Sid Auto-Build (Dependency Trigger)

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '.github/workflows/**'
  schedule:
    - cron: '0 0 * * *' # Checks Debian mirrors every day
  workflow_dispatch:

env:
  FORCE_BUILD: "false"

jobs:
  check-dependencies:
    runs-on: ubuntu-latest
    outputs:
      needs_build: ${{ steps.decision.outputs.needs_build }}
    steps:
      - name: Fetch Latest Sid Versions
        id: check
        run: |
          PY3_VER=$(curl -s "https://api.ftp-master.debian.org/madison?package=python3&s=sid&text=on" | awk '{print $3}' | head -n 1)
          GRPCIO_VER=$(curl -s "https://api.ftp-master.debian.org/madison?package=python3-grpcio&s=sid&text=on" | awk '{print $3}' | head -n 1)
          GRPC_TOOLS_VER=$(curl -s "https://api.ftp-master.debian.org/madison?package=python3-grpc-tools&s=sid&text=on" | awk '{print $3}' | head -n 1)
          URWID_VER=$(curl -s "https://api.ftp-master.debian.org/madison?package=python3-urwid&s=sid&text=on" | awk '{print $3}' | head -n 1)
          LIBTORRENT_VER=$(curl -s "https://api.ftp-master.debian.org/madison?package=libtorrent-rasterbar-dev&s=sid&text=on" | awk '{print $3}' | head -n 1)
          GRPC_CPP_VER=$(curl -s "https://api.ftp-master.debian.org/madison?package=libgrpc++-dev&s=sid&text=on" | awk '{print $3}' | head -n 1)
          FINGERPRINT="sid-py${PY3_VER}-grio${GRPCIO_VER}-gtl${GRPC_TOOLS_VER}-urw${URWID_VER}-lt${LIBTORRENT_VER}-gcp${GRPC_CPP_VER}"
          echo "fingerprint=$FINGERPRINT" >> $GITHUB_OUTPUT

      - name: Check Cache
        id: cache-check
        uses: actions/cache@v4
        with:
          path: dependency-fingerprint.txt
          key: build-cache-sid-${{ steps.check.outputs.fingerprint }}

      - name: Decide to Build
        id: decision
        run: |
          if [[ "${{ github.event_name }}" == "push" ]] || [[ "${{ steps.cache-check.outputs.cache-hit }}" != "true" ]] || [[ "${{ env.FORCE_BUILD }}" == "true" ]]; then
            echo "needs_build=true" >> $GITHUB_OUTPUT
            echo "${{ steps.check.outputs.fingerprint }}" > dependency-fingerprint.txt
          else
            echo "needs_build=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-dependencies
    if: needs.check-dependencies.outputs.needs_build == 'true'
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64, riscv64]
        
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up QEMU
        if: matrix.arch != 'amd64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ matrix.arch }}

      - name: Build Debian Package
        run: |
          docker run --rm \
            --platform linux/${{ matrix.arch }} \
            -v ${{ github.workspace }}:/src \
            -e DEBFULLNAME="GitHub Actions CI" \
            -e DEBEMAIL="actions@github.com" \
            -e DEB_BUILD_OPTIONS="noautodbgsym" \
            debian:sid /bin/bash -c "
              set -e
              export DEBIAN_FRONTEND=noninteractive
              
              apt-get update
              
              # THE FIX: Freeze systemd at v259 so it doesn't upgrade to v260 and crash QEMU
              apt-mark hold systemd systemd-sysv libsystemd0 udev libudev1
              
              # Sync the container with the Sid mirrors to resolve pending conflicts
              apt-get dist-upgrade -y || true
              
              apt-get autoremove -y
              
              apt-get install -y devscripts equivs build-essential dh-python git-buildpackage git tar
              
              mkdir -p /build
              cp -a /src/. /build/
              cd /build
              
              git config --global --add safe.directory /build
              git config --global user.name \"\$DEBFULLNAME\"
              git config --global user.email \"\$DEBEMAIL\"
              
              mk-build-deps -i -t 'apt-get -y --no-install-recommends' debian/control
              
              echo '=== Auto-Versioning ==='
              # 1. Generate the snapshot FIRST
              gbp dch --ignore-branch --snapshot --auto
              
              # 2. OVERWRITE IT. This strips everything between '-drbl' and the '~' and forces it to be '-drblsid'
              sed -i -E '1s/-drbl[^~]+~/-drblsid~/' debian/changelog
              
              UPSTREAM_VER=\$(dpkg-parsechangelog -S Version | sed 's/-.*//' | sed 's/~.*//')
              
              echo '=== Building SOURCE and Binary ==='
              tar --exclude=debian -czf ../ezio_\${UPSTREAM_VER}.orig.tar.gz .
              dpkg-buildpackage -us -uc
              
              mkdir -p /src/output-debs
              cp ../*.deb /src/output-debs/
              cp ../*.orig.tar.gz /src/output-debs/ || true
              cp ../*.dsc /src/output-debs/ || true
              cp ../*.debian.tar.xz /src/output-debs/ || true
              cp ../*.changes /src/output-debs/ || true
              
              chmod -R 777 /src/output-debs/
            "

      # Generate the timestamp
      - name: Generate Timestamp
        id: time
        run: echo "timestamp=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      # Keep the matrix variable and add the timestamp
      - name: Upload .deb to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ezio-sid-packages-${{ matrix.arch }}-${{ steps.time.outputs.timestamp }}
          path: output-debs/

      - name: Deploy to file Server
        # To use this deployment, at github: Settings > Secrets and variables > Actions.
        # Map the secret to an env var first, then check the env var in 'if'
        env:
          SSH_KEY: ${{ secrets.REMOTE_SSH_KEY }}
          HOST: ${{ secrets.REMOTE_HOST }}
          USER: ${{ secrets.REMOTE_USER }}
          DEST: ${{ secrets.REMOTE_PATH }}
        if: env.SSH_KEY != ''
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts
          rsync -avz -e "ssh -i ~/.ssh/id_rsa" output-debs/ $USER@$HOST:$DEST
