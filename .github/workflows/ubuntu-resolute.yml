name: Ubuntu Resolute Auto-Build (Dependency Trigger)

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '.github/workflows/**'
  schedule:
    - cron: '5 0 * * *' # Checks Ubuntu mirrors every day
  workflow_dispatch:

env:
  FORCE_BUILD: "false"

jobs:
  check-dependencies:
    runs-on: ubuntu-latest
    outputs:
      needs_build: ${{ steps.decision.outputs.needs_build }}
    steps:
      - name: Fetch Latest Resolute Versions
        id: check
        run: |
          # Use the Ubuntu Madison API for the 'resolute' suite
          BASE_URL="https://people.canonical.com/~ubuntu-archive/madison.cgi"
          
          PY3_VER=$(curl -s "${BASE_URL}?package=python3&s=resolute&text=on" | awk '{print $3}' | head -n 1)
          GRPCIO_VER=$(curl -s "${BASE_URL}?package=python3-grpcio&s=resolute&text=on" | awk '{print $3}' | head -n 1)
          GRPC_TOOLS_VER=$(curl -s "${BASE_URL}?package=python3-grpc-tools&s=resolute&text=on" | awk '{print $3}' | head -n 1)
          URWID_VER=$(curl -s "${BASE_URL}?package=python3-urwid&s=resolute&text=on" | awk '{print $3}' | head -n 1)
          LIBTORRENT_VER=$(curl -s "${BASE_URL}?package=libtorrent-rasterbar-dev&s=resolute&text=on" | awk '{print $3}' | head -n 1)
          GRPC_CPP_VER=$(curl -s "${BASE_URL}?package=libgrpc++-dev&s=resolute&text=on" | awk '{print $3}' | head -n 1)
          
          FINGERPRINT="resolute-py${PY3_VER}-grio${GRPCIO_VER}-gtl${GRPC_TOOLS_VER}-urw${URWID_VER}-lt${LIBTORRENT_VER}-gcp${GRPC_CPP_VER}"
          echo "Dependency Fingerprint: $FINGERPRINT"
          echo "fingerprint=$FINGERPRINT" >> $GITHUB_OUTPUT

      - name: Check Cache
        id: cache-check
        uses: actions/cache@v4
        with:
          path: dependency-fingerprint.txt
          # Updated cache key to prevent collision with Questing
          key: build-cache-resolute-${{ steps.check.outputs.fingerprint }}

      - name: Decide to Build
        id: decision
        run: |
          if [[ "${{ github.event_name }}" == "push" ]] || [[ "${{ steps.cache-check.outputs.cache-hit }}" != "true" ]] || [[ "${{ env.FORCE_BUILD }}" == "true" ]]; then
            echo "needs_build=true" >> $GITHUB_OUTPUT
            echo "${{ steps.check.outputs.fingerprint }}" > dependency-fingerprint.txt
          else
            echo "needs_build=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-dependencies
    if: needs.check-dependencies.outputs.needs_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Build Debian Package
        run: |
          # Using the official Ubuntu Resolute (26.04) image
          docker run --rm \
            -v ${{ github.workspace }}:/src \
            -e DEBFULLNAME="GitHub Actions CI" \
            -e DEBEMAIL="actions@github.com" \
            -e DEB_BUILD_OPTIONS="noautodbgsym" \
            ubuntu:resolute /bin/bash -c "
              set -e
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y devscripts equivs build-essential dh-python git-buildpackage git tar
              
              mkdir -p /build
              cp -a /src/. /build/
              cd /build
              
              git config --global --add safe.directory /build
              git config --global user.name \"\$DEBFULLNAME\"
              git config --global user.email \"\$DEBEMAIL\"
              
              # Resolve build-dependencies for Resolute
              mk-build-deps -i -t 'apt-get -y --no-install-recommends' debian/control
              
              echo '=== Auto-Versioning ==='
              # 1. Generate the snapshot FIRST (It will generate something like '-drbl4ubuntu1~1.gbp88c1fb')
              gbp dch --ignore-branch --snapshot --auto
              
              # 2. OVERWRITE IT. This strips everything between '-drbl' and the '~' and forces it to be '-drblresolute'
              sed -i -E '1s/-drbl[^~]+~/-drblresolute~/' debian/changelog
              
              # NO STRAY BACKTICK HERE ANYMORE!
              UPSTREAM_VER=\$(dpkg-parsechangelog -S Version | sed 's/-.*//' | sed 's/~.*//')

              echo '=== Building SOURCE and Binary (amd64) ==='
              tar --exclude=debian -czf ../ezio_\${UPSTREAM_VER}.orig.tar.gz .
              dpkg-buildpackage -us -uc
              
              mkdir -p /src/output-debs
              cp ../*.deb /src/output-debs/
              cp ../*.orig.tar.gz /src/output-debs/ || true
              cp ../*.dsc /src/output-debs/ || true
              cp ../*.debian.tar.xz /src/output-debs/ || true
              cp ../*.changes /src/output-debs/ || true

              # Grant full read permissions so GitHub Actions can upload the files
              chmod -R 777 /src/output-debs/
            "

      # Generate the timestamp
      - name: Generate Timestamp
        id: time
        run: echo "timestamp=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      # Append the timestamp to the artifact name
      - name: Upload .deb to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ezio-resolute-packages-amd64-${{ steps.time.outputs.timestamp }}
          path: output-debs/

      - name: Deploy to file Server
        env:
          SSH_KEY: ${{ secrets.REMOTE_SSH_KEY }}
          HOST: ${{ secrets.REMOTE_HOST }}
          USER: ${{ secrets.REMOTE_USER }}
          DEST: ${{ secrets.REMOTE_PATH }}
        if: env.SSH_KEY != ''
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts
          rsync -avz -e "ssh -i ~/.ssh/id_rsa" output-debs/ $USER@$HOST:$DEST
